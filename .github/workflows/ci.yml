name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check main.js syntax
        run: node --check main.js

      - name: Check script syntax
        run: |
          for file in *.mjs; do
            echo "Checking $file"
            node --check "$file"
          done
