name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site files
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p _site
          cp index.html main.js styles.css _site/
          node <<'NODE'
          const fs = require('node:fs');
          const url = process.env.SUPABASE_URL ?? '';
          const anonKey = process.env.SUPABASE_ANON_KEY ?? '';
          const target = '_site/supabase-config.js';

          if (url && anonKey) {
            fs.writeFileSync(target, `window.SUPABASE_CONFIG = {
  url: '${url}',
  anonKey: '${anonKey}',
};
`);
          } else if (
            fs.existsSync('supabase-config.js')
            && !fs.readFileSync('supabase-config.js', 'utf8').includes('YOUR_PROJECT')
          ) {
            fs.copyFileSync('supabase-config.js', target);
          } else {
            fs.copyFileSync('supabase-config.example.js', target);
          }
          NODE

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
