<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Procvičování matematiky</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="main.js" defer></script>
</head>
<body>
  <main class="app">
    <h1 class="app__title" id="app-title">Procvičování matematiky</h1>

    <section class="screen" id="setup-screen">
      <div class="setup-panels">
        <fieldset class="operation-picker" id="decimal-operation-picker">
          <legend class="operation-picker__legend">Početní operace s desetinnými čísly</legend>
          <div class="operation-picker__options">
            <label class="operation-picker__option">
              <input type="checkbox" name="operation" value="add">
              Sčítání desetinných čísel
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="operation" value="subtract">
              Odčítání desetinných čísel
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="operation" value="multiply">
              Násobení desetinných čísel
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="operation" value="divide">
              Dělení desetinných čísel
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="operation" value="power-ten">
              · 10; 100; 1000
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="operation" value="divide-power-ten">
              : 10; 100; 1000
            </label>
          </div>
        </fieldset>

        <fieldset class="operation-picker" id="integer-operation-picker">
          <legend class="operation-picker__legend">Početní operace se zápornými čísly</legend>
          <div class="operation-picker__options">
            <label class="operation-picker__option">
              <input type="checkbox" name="integer-mode" value="integer-add-subtract">
              Sčítání a odčítání celých čísel
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="integer-mode" value="integer-multiply-divide">
              Násobení a dělení celých čísel
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="integer-mode" value="non-integer-add-subtract">
              Sčítání a odčítání necelých čísel
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="integer-mode" value="non-integer-multiply-divide">
              Násobení a dělení necelých čísel
            </label>
          </div>
        </fieldset>

        <fieldset class="operation-picker" id="powers-operation-picker">
          <legend class="operation-picker__legend">Počítání s mocninami a druhou odmocninou</legend>
          <div class="operation-picker__options operation-picker__options--single">
            <label class="operation-picker__option">
              <input type="checkbox" name="powers-mode" value="powers">
              Mocniny celých čísel
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="powers-mode" value="sqrt">
              Druhá odmocnina
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="powers-mode" value="non-integer-powers">
              Mocniny necelých čísel
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="powers-mode" value="non-integer-sqrt">
              Odmocniny necelých čísel
            </label>
          </div>
        </fieldset>

        <fieldset class="operation-picker" id="fraction-operation-picker">
          <legend class="operation-picker__legend">Početní operace se zlomky</legend>
          <div class="operation-picker__options">
            <label class="operation-picker__option">
              <input type="checkbox" name="fraction-mode" value="basic-form">
              Základní tvar
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="fraction-mode" value="fraction-add">
              Sčítání zlomků
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="fraction-mode" value="fraction-subtract">
              Odčítání zlomků
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="fraction-mode" value="fraction-multiply">
              Násobení zlomků
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="fraction-mode" value="fraction-divide">
              Dělení zlomků
            </label>
            <label class="operation-picker__option">
              <input type="checkbox" name="fraction-mode" value="fraction-compound">
              Složený zlomek
            </label>
          </div>
        </fieldset>
      </div>

      <div class="setup-option" id="require-basic-form-option">
        <label class="setup-option__label">
          <input type="checkbox" id="require-basic-form-checkbox" checked>
          Vyžadovat jako výsledek zlomek v základním tvaru.
        </label>
        <p class="setup-option__hint">V režimu Základní tvar se základní tvar vyžaduje vždy.</p>
      </div>

      <p class="setup-feedback" id="setup-feedback" hidden aria-live="polite"></p>

      <button class="btn btn--primary" type="button" id="start-btn" disabled>Spustit</button>
    </section>

    <section class="screen" id="exercise-screen" hidden>
      <div class="exercise-actions">
        <button class="btn btn--secondary" type="button" id="finish-btn">Ukončit</button>
        <button class="btn btn--secondary btn--back" type="button" id="back-btn">Zpět</button>
      </div>

      <div class="problem-area">
        <p class="problem-level" id="problem-level"></p>
        <p class="problem" id="problem" aria-live="polite"></p>
      </div>

      <form class="answer-form" id="answer-form" novalidate>
        <div class="answer-form__entry">
          <div class="answer-form__fields">
            <div class="answer-form__decimal-wrap is-visible" id="decimal-answer-wrap">
              <input
                class="answer-form__input"
                id="answer-input"
                type="text"
                inputmode="none"
                autocomplete="off"
                required
              >
            </div>

            <div class="answer-form__fraction-wrap" id="fraction-answer-wrap" hidden>
              <div class="fraction answer-fraction" id="answer-fraction">
                <input
                  class="answer-form__fraction-input fraction__num"
                  id="answer-numerator"
                  type="text"
                  inputmode="none"
                  autocomplete="off"
                  maxlength="3"
                  aria-label="Čitatel"
                >
                <span class="fraction__bar-row">
                  <span class="fraction__sign" id="answer-fraction-sign" aria-hidden="true"></span>
                  <span class="fraction__bar" aria-hidden="true"></span>
                </span>
                <input
                  class="answer-form__fraction-input fraction__den"
                  id="answer-denominator"
                  type="text"
                  inputmode="none"
                  autocomplete="off"
                  maxlength="3"
                  aria-label="Jmenovatel"
                >
              </div>
            </div>
          </div>

          <button
            class="answer-form__shape-toggle"
            type="button"
            id="answer-shape-toggle-btn"
            data-action="toggle-answer-shape"
            aria-label="Přepnout odpověď na zlomek"
          >
            <svg class="answer-form__shape-toggle-icon" viewBox="0 0 88 47" fill="none" aria-hidden="true">
              <rect x="5" width="20" height="20" rx="6" fill="#D9D9D9"/>
              <rect x="54" y="17" width="34" height="20" rx="6" fill="#D9D9D9"/>
              <rect x="5" y="27" width="20" height="20" rx="6" fill="#D9D9D9"/>
              <path d="M0.5 23.5H29.5" stroke="currentColor" stroke-linecap="round"/>
              <path d="M49 9.5L38 38.5" stroke="currentColor" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <div class="math-keypad" id="math-keypad" aria-label="Matematická klávesnice">
          <div class="math-keypad__grid">
            <button class="math-keypad__key" type="button" data-value="7">7</button>
            <button class="math-keypad__key" type="button" data-value="8">8</button>
            <button class="math-keypad__key" type="button" data-value="9">9</button>
            <button class="math-keypad__key" type="button" data-value="4">4</button>
            <button class="math-keypad__key" type="button" data-value="5">5</button>
            <button class="math-keypad__key" type="button" data-value="6">6</button>
            <button class="math-keypad__key" type="button" data-value="1">1</button>
            <button class="math-keypad__key" type="button" data-value="2">2</button>
            <button class="math-keypad__key" type="button" data-value="3">3</button>
            <button class="math-keypad__key" type="button" data-value=",">,</button>
            <button class="math-keypad__key" type="button" data-value="0">0</button>
            <button class="math-keypad__key" type="button" data-value="-">−</button>
            <button class="math-keypad__key math-keypad__key--wide" type="button" data-action="backspace" aria-label="Smazat">⌫</button>
          </div>
        </div>
      </form>

      <button class="btn btn--primary" type="button" id="primary-action-btn">Ověřit</button>

      <p class="feedback" id="feedback" aria-live="polite"></p>
    </section>

    <section class="screen screen--wide" id="analysis-screen" hidden>
      <h2 class="analysis__heading">Analýza</h2>

      <div class="analysis__name">
        <label class="analysis__name-label" for="analysis-name-input">Jméno</label>
        <input
          class="analysis__name-input"
          id="analysis-name-input"
          type="text"
          autocomplete="name"
          placeholder="Volitelné"
        >
        <p class="analysis__name-value" id="analysis-name-display" hidden></p>
      </div>

      <div class="analysis__summary" id="analysis-summary"></div>
      <div class="analysis__levels" id="analysis-levels"></div>
      <div class="analysis__problem-view" id="analysis-problem-view" hidden>
        <span class="analysis__problem-view-label">Zobrazení úloh:</span>
        <div class="analysis__problem-view-options" role="group" aria-label="Zobrazení úloh">
          <button class="analysis__problem-view-btn is-active" type="button" data-problem-view="text">Textově</button>
          <button class="analysis__problem-view-btn" type="button" data-problem-view="formatted">Graficky</button>
        </div>
      </div>
      <div class="analysis__table-wrap">
        <table class="analysis__table">
          <thead>
            <tr>
              <th>#</th>
              <th>Úloha</th>
              <th>Úroveň</th>
              <th>Tvá odpověď</th>
              <th>Správně</th>
              <th>Výsledek</th>
            </tr>
          </thead>
          <tbody id="analysis-table-body"></tbody>
        </table>
      </div>
      <div class="analysis__actions">
        <button class="btn btn--secondary" type="button" id="analysis-download-btn" disabled>
          Stáhnout CSV
        </button>
        <button class="btn btn--secondary" type="button" id="analysis-link-btn" disabled>
          Vygenerovat odkaz
        </button>
        <button class="btn btn--secondary btn--back" type="button" id="analysis-back-btn">Zpět</button>
      </div>
      <p class="analysis__link-feedback" id="analysis-link-feedback" hidden></p>
      <div class="analysis__link-wrap" id="analysis-link-wrap" hidden>
        <label class="analysis__link-label" for="analysis-link-input">Odkaz na analýzu</label>
        <div class="analysis__link-row">
          <input
            class="analysis__link-input"
            id="analysis-link-input"
            type="text"
            readonly
          >
          <button
            class="analysis__link-copy"
            type="button"
            id="analysis-link-copy-btn"
            aria-label="Zkopírovat odkaz"
            title="Zkopírovat odkaz"
          >
            <svg class="analysis__link-copy-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="9" y="9" width="11" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1.8"/>
              <path d="M7 15H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v1" fill="none" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
